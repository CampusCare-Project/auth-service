version: "3.9"

services:
  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auth-service
    restart: unless-stopped
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      auth-postgres:
        condition: service_healthy
      auth-redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - auth_net

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    command: bunx prisma migrate deploy
    env_file: .env
    restart: "no"
    depends_on:
      auth-postgres:
        condition: service_healthy
    networks:
      - auth_net

  auth-postgres:
    image: postgres:16-alpine
    container_name: auth-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "123"
      POSTGRES_DB: db_auth_service
    volumes:
      - auth_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d db_auth_service"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - auth_net

  auth-redis:
    image: redis:7-alpine
    container_name: auth-redis
    restart: unless-stopped
    volumes:
      - auth_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - auth_net

volumes:
  auth_pg_data:
  auth_redis_data:

networks:
  auth_net:
    name: auth_net  
    driver: bridge